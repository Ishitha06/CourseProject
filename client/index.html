<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbis</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="overlay"></div>

    <div class="container">

        <!-- LEFT TEXT -->
        <div class="left">
            <h1>Plan smart with Orbis</h1>
            <br>
            <br>

            <div class="feature-list">
                <h2>Everything you need to travel smarter in one place!</h2>
                 <br>
                 <br>
                <ul>
                    <li>Generate custom itineraries instantly</li>
                    <li>Get recommended hotels tailored to you</li>
                    <li>Estimate trip budgets with ease</li>
                    <li>Add reminders directly to your calendar</li>
                </ul>
            </div>
        </div>

        <!-- RIGHT LOGIN -->
        <div class="right">
            <div class="login-box">

                <h2 class="logo">Orbis</h2>

                <div class="toggle">
                    <button id="loginBtn" class="active">Login</button>
                    <button id="signupBtn">Sign Up</button>
                </div>

                <!-- LOGIN -->
                <form id="loginForm">
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>

                <!-- SIGNUP -->
                <form id="signupForm" class="hidden">
                    <input type="text" placeholder="Name" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit">Sign Up</button>
                </form>

            </div>
        </div>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
